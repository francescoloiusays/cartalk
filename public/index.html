<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie Talkie Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Walkie Talkie</h1>
            <div id="status" class="status offline">Disconnected</div>
        </header>

        <main>
            <div class="ptt-container">
                <button id="pttButton" class="ptt-btn">
                    <span class="btn-text">PUSH TO TALK</span>
                </button>
                <div class="pulse-ring"></div>
            </div>
            <div id="feedback" class="feedback">Release to send audio</div>
        </main>
    </div>

    <!-- Required socket.io script, served by the server automatically -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
